name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    name: Qualidade (typecheck · lint · format · storybook)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Build Storybook
        run: npm run build-storybook

    # Acessibilidade (npm run test:a11y) roda localmente: exige subir o Storybook
    # e baixar os browsers do Playwright — pesado/frágil para o CI. Ver CONTRIBUTING.md.
